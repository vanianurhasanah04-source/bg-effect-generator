name: Auto Extract ProceduralMotionEngine

on:
  workflow_dispatch:
  push:
    paths:
      - "ProceduralMotionEngine.zip"

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Extract ZIP
        run: |
          unzip -o ProceduralMotionEngine_Phase5.zip -d ProceduralMotionEngine

      - name: Remove ZIP
        run: |
          rm ProceduralMotionEngine.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Auto extract ProceduralMotionEngine.zip"
            git push
          fi
